name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'ghpages-site/**'
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies for Logo Maker
        run: pnpm install
        working-directory: ghpages-site/mini-tools/logo-maker

      - name: Build Logo Maker
        run: pnpm run build
        working-directory: ghpages-site/mini-tools/logo-maker

      - name: Prepare Deployment Directory
        run: |
          mkdir -p public_site
          
          # Copy root landing page and assets
          cp ghpages-site/index.html ghpages-site/ilc.svg public_site/
          
          # Copy docs
          mkdir -p public_site/docs
          cp docs/* public_site/docs/
          
          # Copy mini-tools (top level HTML files)
          mkdir -p public_site/mini-tools
          cp ghpages-site/mini-tools/*.html public_site/mini-tools/
          
          # Copy logo-maker (exclude node_modules)
          mkdir -p public_site/mini-tools/logo-maker
          cp ghpages-site/mini-tools/logo-maker/iliqchuan-logo-maker.html public_site/mini-tools/logo-maker/
          cp -r ghpages-site/mini-tools/logo-maker/build public_site/mini-tools/logo-maker/
          cp -r ghpages-site/mini-tools/logo-maker/assets public_site/mini-tools/logo-maker/
          
          # Check structure
          ls -R public_site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_site
