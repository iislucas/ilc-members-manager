<div class="page-layout">
  <div class="pill-tabs">
    <button class="pill-tab" data-label="Members" [class.active]="activeTab() === 'members'" (click)="setActiveTab('members')">Members</button>
    <button class="pill-tab" data-label="Schools" [class.active]="activeTab() === 'schools'" (click)="setActiveTab('schools')">Schools</button>
    <button class="pill-tab" data-label="Orders" [class.active]="activeTab() === 'orders'" (click)="setActiveTab('orders')">Orders</button>
  </div>

  @if (activeTab() === 'members') {
    <div class="tab-content">
      <app-import-members></app-import-members>
    </div>
  }

  @if (activeTab() === 'schools') {
    <div class="tab-content">
      <app-import-schools></app-import-schools>
    </div>
  }

  @if (activeTab() === 'orders') {
    <div class="tab-content">
      <app-import-orders></app-import-orders>
    </div>
  }
</div>
