<div class="instructor-search-container">
  <div class="search-box">
    <app-icon class="search-icon" name="search"></app-icon>
    <input
      id="search-input"
      type="text"
      [value]="searchTerm()"
      (input)="onSearch($event)"
      placeholder="Search by name, city, or country..."
    />
  </div>

  @if (findInstructorsService.instructors.loading()) {
    <div class="center">
      <app-spinner></app-spinner>
    </div>
  } @else {
    <div class="results-container">
      @if (filteredInstructors().length > 0) {
        @for (instructor of filteredInstructors(); track instructor.docId) {
          <app-instructor-card [instructor]="instructor"> </app-instructor-card>
        }
      } @else {
        <p>No instructors found.</p>
      }
    </div>
  }
</div>
