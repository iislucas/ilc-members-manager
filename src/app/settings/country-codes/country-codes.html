<div class="control-panel">
  <h2>Country Codes</h2>
  <p>Manage the list of allowed country codes.</p>

  @if (dataManager.countries.loading()) {
  <div>
    <app-spinner></app-spinner> Loading...
  </div>
  } @else {
  
  <div class="code-list">
    @for (code of countryCodes(); track $index; let last = $last) {
    <div class="code-row">
      <input type="text" [(ngModel)]="code.id" class="form-control" style="width: 80px;" placeholder="e.g. US">
      <input type="text" [(ngModel)]="code.name" class="form-control" style="width: 250px;"
        placeholder="e.g. United States">
      <button type="button" class="icon-only-button" (click)="removeCountryCode($index)" title="Remove country code">
        <app-icon name="trash" />
      </button>
      @if (last) {
      <button type="button" class="icon-only-button add-code-btn" (click)="addCountryCode()" title="Add another country code">
        <app-icon name="add" />
      </button>
      }
    </div>
    }
    @if (countryCodes().length === 0) {
    <div class="add-code-row">
      <button type="button" class="text-button" (click)="addCountryCode()">
        + Add Country Code
      </button>
    </div>
    }
  </div>

  <div>
    <button class="action-button primary" (click)="saveCountryCodes()" [disabled]="isSaving()">
      {{ isSaving() ? 'Saving...' : 'Save Country Codes' }}
    </button>
    </div>
  @if (statusMessage()) {
  <p class="status-message">{{ statusMessage() }}</p>
  }
  
  }
</div>
