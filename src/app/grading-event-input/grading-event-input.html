<div class="event-input-wrapper">

  <!-- Date first, always shown (even when an event is linked). -->
  <div class="event-manual-row">
    <label class="small-label">Date of grading</label>
    <input
      type="date"
      [value]="editDate()"
      (input)="onDateInput($event)"
    />
  </div>

  <!-- Single checkbox: was the grading at a listed workshop/event, or not? -->
  <div class="event-not-listed-row">
    <label class="checkbox-label">
      <input
        type="checkbox"
        [checked]="notListed()"
        (change)="setNotListed($any($event.target).checked)"
      />
      Grading was not at a listed workshop/event
    </label>
  </div>

  @if (!notListed()) {
    <!-- ILC event search -->
    <div class="event-search-section">
      <label class="small-label">Grading happened at event:</label>
      <app-autocomplete
        class="event-autocomplete"
        name="Event"
        [searchableSet]="eventsSet"
        [displayFns]="eventDisplayFns"
        [inputBoxIsChip]="false"
        [initSearchTerm]="linkedEventName() || editEvent()"
        placeholder="Search ILC events…"
        (itemSelected)="onEventSelected($event)"
      ></app-autocomplete>
      <div class="event-range-hint">
        <span class="small-label">(events from</span>
        <input
          type="date"
          [value]="eventRangeFrom()"
          (change)="eventRangeFrom.set(asDateStr($event))"
        />
        <span class="small-label">to</span>
        <input
          type="date"
          [value]="eventRangeTo()"
          (change)="eventRangeTo.set(asDateStr($event))"
        />
        <span class="small-label">)</span>
      </div>
      @if (editDocId()) {
        <div class="linked-event-status">
          <span>Linked Event:</span>
          <a class="linked-event-link" [href]="linkedEventHref()">
            <app-icon name="event"></app-icon>{{ linkedEventName() || editEvent() }}
          </a>
          @if (linkedEventOutOfRange()) {
            <span class="range-warning">(not in current date range)</span>
          }
        </div>
      }
    </div>
  }

</div>
