@let u = user();
@if (u) {
  <div class="gradings-summary">
    <div class="summary-item">
      <span class="label">Current Level:</span>
      <span class="value">{{ currentLevelDisplay() }}</span>
    </div>
    @if (nextGrading()) {
      <div class="summary-item">
        <span class="label">Next Grading:</span>
        <span class="value">
          {{ nextGrading() }}
          @if (nextGradingPurchased()) {
            <span class="purchased-badge">
              <app-icon name="check" /> Purchased
            </span>
          } @else {
            <a
              href="https://www.iliqchuan.com/products/gradings"
              target="_blank"
              rel="noopener noreferrer"
              class="subtle-button purchase-btn"
            >
              <app-icon name="arrow_forward" /> Purchase
            </a>
          }
        </span>
      </div>
    }
  </div>

  @if (isInstructor()) {
    <div class="tabs">
      <button
        class="tab-button"
        [class.active]="activeTab() === 'examined'"
        (click)="setActiveTab('examined')"
      >
        Gradings as examiner
      </button>
      <button
        class="tab-button"
        [class.active]="activeTab() === 'students'"
        (click)="setActiveTab('students')"
      >
        My Students' Gradings
      </button>
      <button
        class="tab-button"
        [class.active]="activeTab() === 'mine'"
        (click)="setActiveTab('mine')"
      >
        My Gradings
      </button>
    </div>
  }

  <div class="grading-list-wrapper">
    @if (isInstructor() && activeTab() !== "mine") {
      <app-grading-list
        [gradingSet]="dataService.myGradingsAssessed"
        [viewMode]="'instructor'"
        [instructorTab]="activeTab()"
      ></app-grading-list>
    } @else {
      <app-grading-list
        [gradingSet]="dataService.myGradings"
        [viewMode]="'member'"
      ></app-grading-list>
    }
  </div>
}
