<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Editor Test</title>
    <!-- Load Angular Web Component styles -->
    <link rel="stylesheet" href="../dist/mobile-editor-wc/browser/styles.css">
    <style>
        body { font-family: sans-serif; padding: 0; margin: 0; background: #f9f9f9; }
        h1 { color: #333; padding: 10px; margin: 0; font-size: 1.5rem; }
        .output-box { padding: 10px; }
        pre { background: #2d2d2d; color: #ccc; padding: 15px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; }
        /* Ensure the custom element has a height */
        app-mobile-editor {
            display: block;
            border: 1px solid #ddd;
            background: white;
            height: 50vh;
        }
    </style>
</head>
<body>
    <h1>Mobile Editor Test (Angular Web Component)</h1>
    
    <!-- The Web Component -->
    <app-mobile-editor id="my-editor"></app-mobile-editor>

    <div class="output-box">
        <h3>Final Markdown Output:</h3>
        <pre id="markdown-output">Waiting for changes...</pre>
    </div>

    <!-- Load Angular Web Component script -->
    <script type="module" src="../dist/mobile-editor-wc/browser/main.js"></script>
    
    <script>
        // Wait for the element to be defined
        customElements.whenDefined('app-mobile-editor').then(() => {
            const editor = document.getElementById('my-editor');
            const output = document.getElementById('markdown-output');
            
            // Set initial value
            editor.initialValue = `# Mobile Editor Test

This is a **Milkdown** editor running as an Angular Web Component.

## Features:
- Minimal overhead
- Custom mobile-friendly toolbar
- Signal-based inputs/outputs

### Try it out:
1. Edit this text
2. Use the toolbar buttons
3. See the output below

Enjoy editing!`;
            
            // Listen for changes
            editor.addEventListener('changed', (event) => {
                console.log('Changed event:', event);
                output.textContent = event.detail;
            });
        });
    </script>
</body>
</html>
